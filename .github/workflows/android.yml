name: Android CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ensure google-services.json exists
        run: |
          if [ ! -f app/google-services.json ]; then
            mkdir -p app
            cat << 'EOF' > app/google-services.json
            {
              "project_info": {
                "project_number": "000000000000",
                "project_id": "local-ci-project",
                "storage_bucket": "local-ci-project.appspot.com"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                    "android_client_info": {
                      "package_name": "com.khalil.DRACS"
                    }
                  },
                  "oauth_client": [],
                  "api_key": [
                    {
                      "current_key": "AIzaSyDUMMYKEYFORCI"
                    }
                  ],
                  "services": {
                    "appinvite_service": {
                      "other_platform_oauth_client": []
                    }
                  }
                }
              ],
              "configuration_version": "1"
            }
            EOF
          fi

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Run unit tests
        run: ./gradlew --no-daemon test
